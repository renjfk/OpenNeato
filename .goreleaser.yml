version: 2

project_name: openneato

env:
  - ESPTOOL_VERSION=v5.2.0

builds:
  - id: openneato-flash
    dir: flash
    binary: openneato-flash
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.esptoolVersion={{ .Env.ESPTOOL_VERSION }}
    env:
      - >-
        {{- if eq .Os "darwin" }}CGO_ENABLED=1{{- else }}CGO_ENABLED=0{{- end }}
      # On darwin/amd64, target macOS 10.13 so the linker doesn't emit newer
      # load commands (e.g. LC_DYLD_CHAINED_FIXUPS, LC_ATOM_INFO) that older
      # dyld versions can't parse. arm64 darwin requires macOS 11+ minimum.
      - >-
        {{- if eq .Os "darwin" }}
          {{- if eq .Arch "amd64" }}MACOSX_DEPLOYMENT_TARGET=10.13
          {{- else }}MACOSX_DEPLOYMENT_TARGET=11.0{{- end }}
        {{- end }}
      - >-
        {{- if eq .Os "darwin" }}
          {{- if eq .Arch "amd64" }}CGO_CFLAGS=-mmacosx-version-min=10.13
          {{- else }}CGO_CFLAGS=-mmacosx-version-min=11.0{{- end }}
        {{- end }}
      - >-
        {{- if eq .Os "darwin" }}
          {{- if eq .Arch "amd64" }}CGO_LDFLAGS=-mmacosx-version-min=10.13 -Wl,-no_fixup_chains
          {{- else }}CGO_LDFLAGS=-mmacosx-version-min=11.0{{- end }}
        {{- end }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
archives:
  - id: flash-tool
    ids:
      - openneato-flash
    formats: [binary]
    # uname-compatible naming (matches tash convention)
    name_template: >-
      openneato-flash_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

release:
  github:
    owner: renjfk
    name: OpenNeato
  extra_files:
    - glob: .pio/build/*-release/*-firmware.bin
    - glob: .pio/build/*-release/*-full.tar.gz

checksum:
  name_template: checksums.txt
  extra_files:
    - glob: .pio/build/*-release/*-firmware.bin
    - glob: .pio/build/*-release/*-full.tar.gz

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
