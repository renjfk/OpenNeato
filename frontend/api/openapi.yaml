    FirmwareVersion:
      type: object
      properties:
        version:
          type: string
          description: Bridge firmware semantic version
        chip:
          type: string
          description: ESP32 chip model (e.g. "ESP32-C3")
        model:
          type: string
          description: Robot model name (e.g. "Botvac D7", empty until identified)
        hostname:
          type: string
          description: mDNS hostname (e.g. "openneato")
        supported:
          type: boolean
          description: True if the connected robot model is officially supported
        identifying:
          type: boolean
          description: True while the bridge is still probing the robot model
      required:
        - version
        - chip
        - model
        - hostname
        - supported
        - identifying
    HistoryFileInfo:
      type: object
      properties:
        name:
          type: string
          description: File name as stored on flash (may include .hs compression suffix)
        size:
          type: number
          description: File size in bytes
        compressed:
          type: boolean
          description: True if stored with heatshrink compression
        recording:
          type: boolean
          description: True if this session is currently being recorded
        session:
          description: Session metadata, or null if not yet written
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MapSession"
        summary:
          description: Session summary, or null if cleaning has not finished
          nullable: true
          allOf:
            - $ref: "#/components/schemas/MapSummary"
      required:
        - name
        - size
        - compressed
        - recording
        - session
        - summary
    MapSession:
      type: object
      properties:
        type:
          type: string
          enum:
            - session
          description: Always "session" - identifies the record type
        mode:
          type: string
          description: 'Cleaning mode: "House", "Spot", or "Manual"'
        time:
          type: number
          description: Unix epoch seconds when the session started
        battery:
          type: number
          description: Battery percentage at session start
      required:
        - type
        - mode
        - time
        - battery
    MapSummary:
      type: object
      properties:
        type:
          type: string
          enum:
            - summary
          description: Always "summary" - identifies the record type
        time:
          type: number
          description: Unix epoch seconds when the session ended
        duration:
          type: number
          description: Session duration in seconds
        mode:
          type: string
          description: 'Cleaning mode: "House", "Spot", or "Manual"'
        recharges:
          type: number
          description: Number of times the robot returned to base to recharge
        snapshots:
          type: number
          description: Number of pose snapshots captured
        distanceTraveled:
          type: number
          description: Total distance traveled in meters
        maxDistFromOrigin:
          type: number
          description: Maximum distance from origin in meters
        totalRotation:
          type: number
          description: Total rotation in degrees
        areaCovered:
          type: number
          description: Estimated area covered in square meters
        errorsDuringClean:
          type: number
          description: Number of errors encountered during cleaning
        batteryStart:
          type: number
          description: Battery percentage at session start
        batteryEnd:
          type: number
          description: Battery percentage at session end
      required:
        - type
        - time
        - duration
        - mode
        - recharges
        - snapshots
        - distanceTraveled
        - maxDistFromOrigin
        - totalRotation
        - areaCovered
        - errorsDuringClean
    WiFiStatus:
      type: object
      properties:
        staConnected:
          type: boolean
          description: Station mode connected to an upstream AP
        ssid:
          type: string
          description: Connected SSID, or last saved SSID when disconnected
        ip:
          type: string
          description: STA IPv4 address (empty when disconnected)
        rssi:
          type: integer
          description: STA signal strength in dBm (0 when disconnected)
        apActive:
          type: boolean
          description: Fallback AP currently broadcasting
        apSsid:
          type: string
          description: Fallback AP SSID (empty when AP is down)
        apIp:
          type: string
          description: Fallback AP IPv4 address (empty when AP is down)
        apClients:
          type: integer
          description: Number of clients connected to the fallback AP
        apFallbackOnDisconnect:
          type: boolean
          description: Whether the AP is brought up automatically when STA drops
        lastError:
          type: string
          description: Human-readable description of the most recent STA failure
      required:
        - staConnected
        - ssid
        - ip
        - rssi
        - apActive
        - apSsid
        - apIp
        - apClients
        - apFallbackOnDisconnect
        - lastError
    WiFiNetwork:
      type: object
      properties:
        ssid:
          type: string
        rssi:
          type: integer
          description: Signal strength in dBm
        open:
          type: boolean
          description: True for open networks (no encryption)
      required:
        - ssid
        - rssi
        - open
    WiFiScanResult:
      type: object
      properties:
        networks:
          type: array
          items:
            $ref: "#/components/schemas/WiFiNetwork"
      required:
        - networks
  responses:
    Ok:
      description: Success acknowledgement
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Ok"
