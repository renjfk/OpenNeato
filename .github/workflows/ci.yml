name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  firmware:
    name: Firmware (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [c3-debug, esp32-debug]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (generates web_assets.h)
        run: npm ci && npm run build
        working-directory: frontend

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/platforms
            ~/.platformio/packages
          key: platformio-${{ matrix.env }}-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e ${{ matrix.env }}

      - name: Format check (clang-format)
        run: python scripts/check_format.py

      - name: Static analysis (clang-tidy)
        run: pio check -e ${{ matrix.env }} --fail-on-defect=low

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint and format check
        run: npm run check
        working-directory: frontend

      - name: Build (lint + typecheck + vite + embed)
        run: npm run build
        working-directory: frontend

  flash-tool:
    name: Flash Tool
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: flash/go.mod

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.3
          args: ./...
          working-directory: flash

      - name: Build
        run: go build -o openneato-flash .
        working-directory: flash
