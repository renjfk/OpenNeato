version: 2

project_name: openneato

env:
  - ESPTOOL_VERSION=v5.2.0

builds:
  - id: openneato-flash
    dir: flash
    binary: openneato-flash
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.esptoolVersion={{ .Env.ESPTOOL_VERSION }}
    env:
      - >-
        {{- if eq .Os "darwin" }}CGO_ENABLED=1{{- else }}CGO_ENABLED=0{{- end }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
archives:
  - id: flash-tool
    ids:
      - openneato-flash
    formats: [binary]
    # uname-compatible naming (matches tash convention)
    name_template: >-
      openneato-flash_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

release:
  github:
    owner: renjfk
    name: OpenNeato
  extra_files:
    - glob: .pio/build/*-release/*-firmware.bin
    - glob: .pio/build/*-release/*-full.tar.gz
    - glob: frontend/dist-docs/openapi.json
    - glob: frontend/dist-docs/api-reference.md

checksum:
  name_template: checksums.txt
  extra_files:
    - glob: .pio/build/*-release/*-firmware.bin
    - glob: .pio/build/*-release/*-full.tar.gz
    - glob: frontend/dist-docs/openapi.json
    - glob: frontend/dist-docs/api-reference.md

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
