name: Build and Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes content (markdown supported)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push release tag
        run: |
          RELEASE_TAG="${{ github.event.inputs.release_tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if ! git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Creating new tag: $RELEASE_TAG"
            git tag -a "$RELEASE_TAG" -m "Release $RELEASE_TAG"
            git push origin "$RELEASE_TAG"
          else
            echo "Tag $RELEASE_TAG already exists"
          fi

      - name: Extract version from tag
        id: version
        run: |
          RELEASE_TAG="${{ github.event.inputs.release_tag }}"
          VERSION=${RELEASE_TAG#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Setting version to: $VERSION"

      - name: Save release notes
        run: |
          cat << 'EOF' > release_notes.md
          ${{ github.event.inputs.release_notes }}
          EOF

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  release:
    name: Build and Release
    runs-on: macos-latest
    needs: prepare

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.release_tag }}

      # --- Frontend ---

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend (lint + typecheck + vite + embed)
        run: npm run build
        working-directory: frontend

      # --- Firmware ---

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/platforms
            ~/.platformio/packages
          key: platformio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware and package release artifacts
        env:
          FIRMWARE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # Build all *-release environments; post-build hook packages
          # firmware artifacts into each env's build dir for GoReleaser
          for env in $(grep -oE '^\[env:([a-zA-Z0-9_-]+-release)\]' platformio.ini | sed 's/\[env:\(.*\)\]/\1/'); do
            echo "Building $env..."
            pio run -e "$env"
          done

      # --- Flash tool + GitHub Release ---

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flash/go.mod

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: /tmp/release

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: >-
            release --clean
            --release-notes=/tmp/release/release_notes.md
            ${{ github.event.inputs.draft == 'true' && '--draft' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark as pre-release
        if: ${{ github.event.inputs.prerelease == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ github.event.inputs.release_tag }}" --prerelease
