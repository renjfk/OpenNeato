name = "openneato-demo"
main = "mock/worker.js"
compatibility_date = "2026-05-17"
compatibility_flags = ["nodejs_compat"]

workers_dev = false
preview_urls = false

assets = { directory = "dist", binding = "ASSETS" }

[[rules]]
type = "Text"
globs = ["**/*.jsonl"]
fallthrough = true

[vars]
DEMO_MODE = "true"

[[ratelimits]]
name = "ANALYTICS_RATE_LIMITER"
namespace_id = "20260518"

  [ratelimits.simple]
  limit = 60
  period = 60

[[routes]]
pattern = "openneato-demo.renjfk.com"
custom_domain = true

[observability]
enabled = true
