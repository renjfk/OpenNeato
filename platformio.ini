; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = firmware/src

[env]
platform = espressif32 @ 6.12.0
board = esp32-c3-devkitm-1
framework = arduino
build_flags =
    -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.partitions = firmware/partition.csv
lib_compat_mode = strict
lib_ldf_mode = chain
lib_deps =
    ayushsharma82/ElegantOTA @ 3.1.7
    ESP32Async/AsyncTCP @ 3.4.10
    ESP32Async/ESPAsyncWebServer @ 3.9.6

[env:Debug]
upload_speed = 115200
monitor_speed = 115200

[env:OTA]
upload_protocol = custom
upload_command = bash -c 'HASH=$$(md5sum "$SOURCE" | cut -d" " -f1) && curl -s "http://neato.home/ota/start?mode=fr&hash=$$HASH" && curl -fsSL -F "file=@$SOURCE" http://neato.home/ota/upload'
