; PlatformIO Project Configuration File
;
; Structure:
;   [env]           — shared settings (platform, framework, libraries, partitions, checks)
;   [board_*]       — board-specific settings (board, build flags)
;   [mode_*]        — build mode settings (debug, ota, release)
;   [env:<board>-<mode>] — concrete targets combining board + mode
;
; To add a new board, create a [board_xyz] section and new env entries
; that extend both the board and a mode (e.g. [env:xyz-debug]).
;
; *-release envs auto-generate release artifacts (firmware.bin + full.tar.gz)
; via a post-build hook in scripts/env_config.py. GoReleaser picks these up
; from .pio/build/*-release/ via extra_files globs. CHIP_MODEL build flag is
; required for each board — the hook reads it to name the artifacts.
;
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = firmware/src
lib_dir = firmware/lib
boards_dir = boards

; --- Shared across all boards and modes ---------------------------------------

[env]
platform = espressif32 @ 6.13.0
framework = arduino
extra_scripts = pre:scripts/env_config.py
board_build.partitions = firmware/partition.csv
board_build.filesystem = spiffs
upload_speed = 115200
monitor_speed = 115200
check_tool = clangtidy
check_flags =
    clangtidy: --config-file=.clang-tidy
check_skip_packages = yes
lib_compat_mode = strict
lib_ldf_mode = chain
lib_deps =
    ESP32Async/AsyncTCP @ 3.4.10
    ESP32Async/ESPAsyncWebServer @ 3.10.1

; --- Build modes --------------------------------------------------------------

[mode_ota]
upload_protocol = custom
upload_command = bash -c 'HASH=$$(md5sum "$SOURCE" | cut -d" " -f1) && curl -f --progress-bar -F "file=@$SOURCE" "http://$UPLOAD_PORT/api/firmware/update?hash=$$HASH"'

; --- Board: ESP32-C3-DevKitM-1 -----------------------------------------------

[board_c3]
board = esp32-c3-devkitm-1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCHIP_MODEL=\"ESP32-C3\"
    -std=gnu++17

; --- Targets (C3) -------------------------------------------------------------

[env:c3-debug]
extends = board_c3

[env:c3-ota]
extends = board_c3, mode_ota
build_flags =
    ${board_c3.build_flags}
    -DENABLE_LOGGING=0

[env:c3-release]
extends = board_c3
build_flags =
    ${board_c3.build_flags}
    -DENABLE_LOGGING=0

; --- Board: ESP32-C6-DevKitC-1 (RISC-V, single-core, WiFi 6) -----------------

[board_c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c6-devkitc-1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCHIP_MODEL=\"ESP32-C6\"
    -std=gnu++17
    ; To pre-seed WiFi credentials at build time (useful for first OTA flash):
    ; -DPRESET_WIFI_SSID=\"YourSSID\"
    ; -DPRESET_WIFI_PASS=\"YourPassword\"

; --- Targets (C6) -------------------------------------------------------------

[env:c6-debug]
extends = board_c6

[env:c6-ota]
extends = board_c6, mode_ota
build_flags =
    ${board_c6.build_flags}
    -DENABLE_LOGGING=0

[env:c6-release]
extends = board_c6
build_flags =
    ${board_c6.build_flags}
    -DENABLE_LOGGING=0

; --- Board: ESP32-S3-DevKitC-1 (Xtensa LX7, dual-core, native USB) -----------

[board_s3]
board = esp32-s3-devkitc-1
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCHIP_MODEL=\"ESP32-S3\"
    -std=gnu++17

; --- Targets (S3) -------------------------------------------------------------

[env:s3-debug]
extends = board_s3

[env:s3-ota]
extends = board_s3, mode_ota
build_flags =
    ${board_s3.build_flags}
    -DENABLE_LOGGING=0

[env:s3-release]
extends = board_s3
build_flags =
    ${board_s3.build_flags}
    -DENABLE_LOGGING=0

; --- Board: ESP32-D0WD-V3 (original ESP32, Xtensa LX6) ----------------------

[board_esp32]
board = esp32dev
build_flags =
    -DCHIP_MODEL=\"ESP32\"
    -std=gnu++17

; --- Targets (ESP32) ----------------------------------------------------------

[env:esp32-debug]
extends = board_esp32

[env:esp32-ota]
extends = board_esp32, mode_ota
build_flags =
    ${board_esp32.build_flags}
    -DENABLE_LOGGING=0

[env:esp32-release]
extends = board_esp32
build_flags =
    ${board_esp32.build_flags}
    -DENABLE_LOGGING=0
