<svg viewBox="0 0 260 270" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e2e33"/>
      <stop offset="100%" stop-color="#1a1a1e"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a42"/>
      <stop offset="50%" stop-color="#2f2f36"/>
      <stop offset="100%" stop-color="#28282e"/>
    </linearGradient>
    <linearGradient id="bumperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e22"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>
    <radialGradient id="turretGrad" cx="0.45" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#58585f"/>
      <stop offset="60%" stop-color="#43434a"/>
      <stop offset="100%" stop-color="#35353c"/>
    </radialGradient>
    <radialGradient id="turretCapGrad" cx="0.4" cy="0.35" r="0.55">
      <stop offset="0%" stop-color="#6a6a72"/>
      <stop offset="100%" stop-color="#4a4a52"/>
    </radialGradient>
    <linearGradient id="wheelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#252528"/>
      <stop offset="50%" stop-color="#2d2d30"/>
      <stop offset="100%" stop-color="#222225"/>
    </linearGradient>
    <linearGradient id="sideGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151518"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="132" cy="252" rx="82" ry="9" fill="#000" opacity="0.3"/>
  <ellipse cx="132" cy="252" rx="60" ry="6" fill="#000" opacity="0.15"/>

  <g transform="translate(130, 135)">
    <!-- Side depth strip -->
    <path d="M -88 28 L -88 38 L 88 42 L 88 32" fill="url(#sideGrad)" stroke="#1a1a1d" stroke-width="0.5"/>

    <!-- Main body shell -->
    <path d="M -88 28 L -88 -20 C -88 -68, -52 -95, 0 -95 C 52 -95, 88 -68, 88 -20 L 88 28 Z"
      fill="url(#bodyGrad)" stroke="#3a3a3f" stroke-width="1"/>

    <!-- Bumper -->
    <path d="M -88 10 L -88 28 L 88 28 L 88 10 Z" fill="url(#bumperGrad)" stroke="#2a2a2e" stroke-width="0.5"/>
    <line x1="-86" y1="28" x2="86" y2="28" stroke="#3d3d42" stroke-width="0.8"/>

    <!-- Bumper IR sensor window -->
    <rect x="-38" y="15" width="76" height="4" rx="2" fill="#0c0c0e" stroke="#252528" stroke-width="0.5"/>
    <circle cx="-20" cy="17" r="1" fill="#1a1a1f"/>
    <circle cx="0" cy="17" r="1" fill="#1a1a1f"/>
    <circle cx="20" cy="17" r="1" fill="#1a1a1f"/>

    <!-- Bumper seam -->
    <line x1="-84" y1="10" x2="84" y2="10" stroke="#2a2a30" stroke-width="0.3"/>

    <!-- Top panel -->
    <path d="M -76 6 L -76 -20 C -76 -60, -44 -83, 0 -83 C 44 -83, 76 -60, 76 -20 L 76 6 Z"
      fill="url(#panelGrad)" stroke="#45454c" stroke-width="0.5"/>

    <!-- Panel edge highlight -->
    <path d="M -60 -20 C -60 -52, -34 -72, 0 -72 C 34 -72, 60 -52, 60 -20"
      fill="none" stroke="#50505a" stroke-width="0.4" opacity="0.5"/>

    <!-- Panel seam -->
    <line x1="-72" y1="-25" x2="72" y2="-25" stroke="#3a3a42" stroke-width="0.3"/>

    <!-- Dustbin release tab -->
    <rect x="-12" y="-84" width="24" height="4" rx="1.5" fill="#363640" stroke="#45454c" stroke-width="0.3"/>

    <!-- LIDAR turret -->
    <ellipse cx="0" cy="-44" rx="30" ry="30" fill="#000" opacity="0.12"/>
    <ellipse cx="0" cy="-46" rx="28" ry="28" fill="url(#turretGrad)" stroke="#55555c" stroke-width="0.8"/>
    <ellipse cx="0" cy="-46" rx="24" ry="24" fill="none" stroke="#3a3a42" stroke-width="0.5"/>
    <ellipse cx="0" cy="-46" rx="20" ry="20" fill="#3a3a42" stroke="#48484f" stroke-width="0.5"/>
    <ellipse cx="0" cy="-46" rx="14" ry="14" fill="url(#turretCapGrad)" stroke="#5a5a62" stroke-width="0.5"/>
    <circle cx="0" cy="-46" r="5" fill="#555560" stroke="#66666e" stroke-width="0.4"/>
    <circle cx="0" cy="-46" r="2.5" fill="#6a6a72"/>
    <ellipse cx="-4" cy="-50" rx="4" ry="2.5" fill="#fff" opacity="0.06"/>

    <!-- Wheels -->
    <rect x="-94" y="-18" width="9" height="38" rx="3" fill="url(#wheelGrad)" stroke="#353538" stroke-width="0.5"/>
    <rect x="-93" y="-4" width="7" height="10" rx="2" fill="#2f2f33" stroke="#3a3a3e" stroke-width="0.3"/>
    <line x1="-92" y1="-12" x2="-87" y2="-12" stroke="#2f2f34" stroke-width="0.6"/>
    <line x1="-92" y1="-6" x2="-87" y2="-6" stroke="#2f2f34" stroke-width="0.6"/>
    <line x1="-92" y1="8" x2="-87" y2="8" stroke="#2f2f34" stroke-width="0.6"/>
    <line x1="-92" y1="14" x2="-87" y2="14" stroke="#2f2f34" stroke-width="0.6"/>

    <rect x="85" y="-18" width="9" height="38" rx="3" fill="url(#wheelGrad)" stroke="#353538" stroke-width="0.5"/>
    <rect x="86" y="-4" width="7" height="10" rx="2" fill="#2f2f33" stroke="#3a3a3e" stroke-width="0.3"/>
    <line x1="87" y1="-12" x2="92" y2="-12" stroke="#2f2f34" stroke-width="0.6"/>
    <line x1="87" y1="-6" x2="92" y2="-6" stroke="#2f2f34" stroke-width="0.6"/>
    <line x1="87" y1="8" x2="92" y2="8" stroke="#2f2f34" stroke-width="0.6"/>
    <line x1="87" y1="14" x2="92" y2="14" stroke="#2f2f34" stroke-width="0.6"/>

    <!-- Front caster -->
    <ellipse cx="0" cy="22" rx="5" ry="3" fill="#1e1e22" stroke="#2a2a2e" stroke-width="0.4"/>

    <!-- Side brush port -->
    <circle cx="-55" cy="15" r="6" fill="#18181b" stroke="#252528" stroke-width="0.4"/>
    <circle cx="-55" cy="15" r="2" fill="#222225"/>

    <!-- Branding -->
    <text x="0" y="-14" text-anchor="middle" font-size="7" font-weight="600"
      fill="#4a4a54" font-family="system-ui, sans-serif" letter-spacing="1.5">neato</text>

    <!-- Charging contacts -->
    <rect x="-14" y="-90" width="6" height="3" rx="1" fill="#4a4a38" stroke="#5a5a48" stroke-width="0.3"/>
    <rect x="8" y="-90" width="6" height="3" rx="1" fill="#4a4a38" stroke="#5a5a48" stroke-width="0.3"/>
  </g>
</svg>
