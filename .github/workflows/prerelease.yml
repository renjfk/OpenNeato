name: Prerelease

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (leave empty for branch-only prerelease)"
        required: false
      comment_id:
        description: "Comment ID for reply (set by slash-command dispatcher)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  resolve:
    name: Resolve context
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      head_ref: ${{ steps.resolve.outputs.head_ref }}
      release_tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}

    steps:
      - name: Resolve
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ inputs.pr_number }}"

          if [ -n "$PR_NUMBER" ]; then
            PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid,headRefName)
            HEAD_SHA=$(echo "$PR_JSON" | jq -r '.headRefOid')
            HEAD_REF=$(echo "$PR_JSON" | jq -r '.headRefName')
          else
            HEAD_SHA="$GITHUB_SHA"
            HEAD_REF="$GITHUB_REF_NAME"
          fi

          LATEST_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" \
            --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // empty')
          BASE="${LATEST_TAG:-v0.0}"
          BASE="${BASE#v}"
          SHORT_SHA="${HEAD_SHA:0:7}"

          if [ -n "$PR_NUMBER" ]; then
            TAG="v${BASE}-pr${PR_NUMBER}.${SHORT_SHA}"
          else
            SAFE_REF=$(echo "$HEAD_REF" | sed 's/[^a-zA-Z0-9._-]/-/g')
            TAG="v${BASE}-${SAFE_REF}.${SHORT_SHA}"
          fi

          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Release: $TAG ($HEAD_REF @ $SHORT_SHA)"

  prerelease:
    name: Build and Prerelease
    runs-on: macos-latest
    needs: resolve

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}
          fetch-depth: 0

      - name: Create release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.resolve.outputs.release_tag }}" -m "Prerelease ${{ needs.resolve.outputs.release_tag }}"
          git push origin "${{ needs.resolve.outputs.release_tag }}"

      # --- Frontend ---

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend (lint + typecheck + vite + embed)
        run: npm run build
        working-directory: frontend

      # --- Firmware ---

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/platforms
            ~/.platformio/packages
          key: platformio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        env:
          FIRMWARE_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          for env in $(grep -oE '^\[env:([a-zA-Z0-9_-]+-release)\]' platformio.ini | sed 's/\[env:\(.*\)\]/\1/'); do
            echo "Building $env..."
            pio run -e "$env"
          done

      # --- Flash tool + GitHub Release ---

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: flash/go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mark as pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve.outputs.release_tag }}"
          REF="${{ needs.resolve.outputs.head_ref }}"
          SHA="${{ needs.resolve.outputs.head_sha }}"
          PR="${{ needs.resolve.outputs.pr_number }}"

          NOTES="Pre-release build from branch \`$REF\` (commit \`$SHA\`)."
          [ -n "$PR" ] && NOTES="Pre-release build from PR #$PR (branch \`$REF\`, commit \`$SHA\`)."

          gh release edit "$TAG" --prerelease --title "Prerelease $TAG" --notes "$NOTES"

      - name: Comment on PR
        if: needs.resolve.outputs.pr_number != '' && inputs.comment_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.resolve.outputs.release_tag }}"
          gh pr comment "${{ needs.resolve.outputs.pr_number }}" --repo "$GITHUB_REPOSITORY" \
            --body "Prerelease [\`$TAG\`](https://github.com/${{ github.repository }}/releases/tag/$TAG) is ready."
